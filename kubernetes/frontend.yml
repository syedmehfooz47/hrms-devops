apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: hrms
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      name: frontend
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: syedmehfooz/hrms-frontend:v1.0
          ports:
            - containerPort: 80
          
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: hrms
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 80
      protocol: TCP
      nodePort: 31010