apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: hrms
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: syedmehfooz/hrms-backend:v1.10
          ports:
            - containerPort: 4000
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgrespassword"
            - name: DB_NAME
              value: "hrms"
            - name: JWT_SECRET
              value: "iUEE2gKvMsi26L9qMjPzwZOWfYT0hdZHgEReFL4jSqX"
            - name: SALT
              value: "10"
            - name: PORT
              value: "4000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: hrms
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      nodePort: 31002
